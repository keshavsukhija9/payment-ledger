version: '3.9'

services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       ledger_test
      POSTGRES_USER:     ledger_user
      POSTGRES_PASSWORD: ledger_pass
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_user -d ledger_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://ledger_user:ledger_pass@postgres-test:5432/ledger_test
      REDIS_URL:    redis://redis-test:6379
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    command: pytest tests/ -v --tb=short
